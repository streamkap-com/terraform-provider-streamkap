# CI workflow for Terraform provider.
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  GO_VERSION_FILE: "go.mod"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1b6671e713fd51c7f28eb88acf29c9bf3c2eb15f # v6.5.0
        with:
          version: v1.64.8
          args: --timeout=5m

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      # Some non-acceptance tests (e.g. TestProviderConfig_MissingClientID) boot the
      # plugin-testing framework, which otherwise auto-downloads Terraform and verifies
      # HashiCorp's GPG signature — currently failing with "openpgp: key expired".
      # Pre-installing Terraform makes the framework use the PATH binary instead.
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '1.11.*'
          terraform_wrapper: false

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: |
          gotestsum --jsonfile unit-results.json \
            --junitfile unit-results.xml \
            -- -v -short -race -coverprofile=coverage.out ./...

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: unit-test-results
          path: |
            unit-results.json
            unit-results.xml
            coverage.out

  integration-tests:
    name: Integration Tests (VCR)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      # VCR replay still drives resource.Test, which needs a Terraform CLI on PATH
      # (the framework's auto-download fails with "openpgp: key expired").
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '1.11.*'
          terraform_wrapper: false

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests (VCR replay)
        run: |
          gotestsum --jsonfile integration-results.json \
            -- -v -run 'TestIntegration_' ./internal/provider/...

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: integration-test-results
          path: integration-results.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o terraform-provider-streamkap_${{ matrix.goos }}_${{ matrix.goarch }} .

  generate:
    name: Verify Generated Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      # tfplugindocs and `terraform fmt` (the root main.go go:generate directives)
      # need a Terraform CLI on PATH.
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '1.11.*'
          terraform_wrapper: false

      # Use `go generate .` (root package only), NOT `./...`. The root directives
      # are `terraform fmt` + tfplugindocs, which regenerate docs from the committed
      # Go schemas. The `internal/generated/doc.go` directive runs tfgen with
      # --backend-path=$STREAMKAP_BACKEND_PATH, which needs the private backend repo
      # that is not (and should not be) available in CI — so we cannot verify schema
      # regeneration here; that stays a local/manual step (`make generate`).
      - name: Generate documentation
        run: go generate .

      - name: Verify no changes
        run: |
          if git diff --exit-code; then
            echo "Docs are up to date"
          else
            echo "Docs are out of date. Run 'make generate' and commit."
            git diff
            exit 1
          fi
